<svg viewBox="0 0 680 780" width="100%" role="img">

<desc>用于3MW柴油发电机SCR系统的气液两相拉瓦尔雾化喷头结构截面图，含详细尺寸标注</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

  </marker>
  <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">

  </marker>
</defs>

<style>
.t { font-family: var(--font-sans, sans-serif); font-size: 13px; fill: #2C2C2A; }
.ts { font-family: var(--font-sans, sans-serif); font-size: 11.5px; fill: #5F5E5A; }
.th { font-family: var(--font-sans, sans-serif); font-size: 13px; font-weight: 500; fill: #2C2C2A; }

.leader { stroke: #B4B2A9; stroke-width: 0.5; fill: none; stroke-dasharray: 4 3; }

<text class="th" x="340" y="30" text-anchor="middle" dominant-baseline="central" font-size="15px">SCR尿素喷射拉瓦尔雾化喷头 — 截面图</text>

<!-- ====== 喷头本体截面 ====== -->

<!-- 气体环形通道 (两侧) -->

<!-- ===== 拉瓦尔喷管主体 y=230~420 ===== -->

<path d="M316 230 L326 310 L354 310 L364 230 Z" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
