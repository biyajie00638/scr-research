<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#f0f7ff"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8731a"/>
      <stop offset="100%" stop-color="#e8a55a"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6fb5"/>
      <stop offset="100%" stop-color="#4da6e0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>

  <!-- 烟气入口 -->
  <rect x="10" y="120" width="60" height="40" rx="6" fill="#e8731a" opacity="0.85"/>
  <text x="40" y="146" text-anchor="middle" fill="white" font-size="11" font-weight="600">烟气入口</text>

  <!-- 烟气流向箭头 -->
  <path d="M72 140 h40" stroke="#e8731a" stroke-width="2.5" marker-end="url(#arrowHot)"/>
  <defs>
    <marker id="arrowHot" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e8731a"/>
    </marker>
  </defs>

  <!-- 尿素喷射区 -->
  <rect x="80" y="85" width="50" height="40" rx="6" fill="#27ae60" opacity="0.85"/>
  <text x="105" y="111" text-anchor="middle" fill="white" font-size="10" font-weight="600">尿素</text>
  <text x="105" y="121" text-anchor="middle" fill="white" font-size="8">喷射区</text>

  <!-- 雾化喷嘴 -->
  <line x1="105" y1="85" x2="105" y2="60" stroke="#27ae60" stroke-width="2"/>
  <circle cx="105" cy="55" r="5" fill="#27ae60"/>
  <text x="105" y="40" text-anchor="middle" fill="#27ae60" font-size="9">喷嘴</text>

  <!-- 箭头发射到混合区 -->
  <path d="M132 110 h50" stroke="#555" stroke-width="2" marker-end="url(#arrowMix)"/>
  <defs>
    <marker id="arrowMix" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- 混合区 -->
  <rect x="142" y="90" width="40" height="40" rx="20" fill="#ddd" opacity="0.6" stroke="#999" stroke-width="1.5"/>
  <text x="162" y="115" text-anchor="middle" fill="#555" font-size="9">混合</text>

  <!-- 箭头到催化剂 -->
  <path d="M184 110 h40" stroke="#1a6fb5" stroke-width="2" marker-end="url(#arrowCool)"/>
  <defs>
    <marker id="arrowCool" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a6fb5"/>
    </marker>
  </defs>

  <!-- 催化剂层 -->
  <rect x="220" y="80" width="70" height="60" rx="6" fill="url(#cool)" opacity="0.85"/>
  <text x="255" y="110" text-anchor="middle" fill="white" font-size="12" font-weight="700">Cu-SCR</text>
  <text x="255" y="127" text-anchor="middle" fill="white" font-size="10">催化剂层</text>

  <!-- 冷区标注 -->
  <path d="M230 80 l10 -25 l20 -25" stroke="#1a6fb5" stroke-width="1.5" stroke-dasharray="4"/>
  <circle cx="210" cy="50" r="4" fill="#1a6fb5"/>
  <text x="195" y="43" fill="#1a6fb5" font-size="9">冷区 T↓</text>

  <!-- 箭头到出口 -->
  <path d="M292 110 h40" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowClean)"/>
  <defs>
    <marker id="arrowClean" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- 洁净烟气出口 -->
  <rect x="330" y="90" width="55" height="40" rx="6" fill="#27ae60" opacity="0.85"/>
  <text x="357" y="113" text-anchor="middle" fill="white" font-size="11" font-weight="600">洁净烟气</text>
  <text x="357" y="125" text-anchor="middle" fill="white" font-size="9">NOx↓ NH3↓</text>

  <!-- 底部标注 -->
  <text x="200" y="190" text-anchor="middle" fill="#888" font-size="10">SCR_NZ001 固定式工业SCR脱硝系统流程</text>

  <!-- 下方关键参数 -->
  <rect x="30" y="210" width="340" height="70" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="232" text-anchor="middle" fill="#444" font-size="11" font-weight="600">— 关键研究参数 —</text>

  <text x="75" y="255" text-anchor="middle" fill="#1a6fb5" font-size="10">喉道临界流</text>
  <text x="175" y="255" text-anchor="middle" fill="#e8731a" font-size="10">SMD / 喷雾锥角</text>
  <text x="280" y="255" text-anchor="middle" fill="#27ae60" font-size="10">氨逃逸 ≤ 3ppm</text>

  <text x="75" y="272" text-anchor="middle" fill="#888" font-size="9">Ma / P-ratio</text>
  <text x="175" y="272" text-anchor="middle" fill="#888" font-size="9">液滴粒径分布</text>
  <text x="280" y="272" text-anchor="middle" fill="#888" font-size="9">NOx 排放控制</text>
</svg>
